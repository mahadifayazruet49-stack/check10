<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Portal Access</title>

<style>
  :root {
    --ink: #1f2430;
    --line: #d7dbe0;
    --panel: #ffffff;
    --bg: #eef0f3;
    --accent: #46546b;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    font-family: "Segoe UI", Arial, Helvetica, sans-serif;
  }

  /* ============ SCREEN MANAGEMENT ============ */
  .screen {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .screen.active { display: flex; }

  /* ============================================================
     SCREEN 1 — boring professional "login portal"
     ============================================================ */
  #screen-login {
    background: var(--bg);
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 36px 36px;
  }

  .portal-card {
    width: 100%;
    max-width: 380px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 6px;
    box-shadow: 0 1px 2px rgba(20, 24, 34, 0.06);
    padding: 36px 32px 30px;
  }

  .portal-tag {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #8a92a3;
    margin: 0 0 6px;
    font-weight: 600;
  }

  .portal-title {
    font-size: 19px;
    font-weight: 600;
    color: var(--ink);
    margin: 0 0 26px;
    line-height: 1.4;
  }

  .field-label {
    display: block;
    font-size: 12.5px;
    color: var(--accent);
    margin-bottom: 6px;
    font-weight: 600;
  }

  .field-input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--line);
    border-radius: 4px;
    font-size: 14px;
    color: var(--ink);
    background: #fbfcfd;
    margin-bottom: 18px;
    outline: none;
    transition: border-color 0.15s ease;
  }
  .field-input:focus {
    border-color: var(--accent);
  }

  .portal-btn {
    width: 100%;
    padding: 11px 0;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 4px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease;
    letter-spacing: 0.01em;
  }
  .portal-btn:hover { background: #374257; }
  .portal-btn:disabled {
    background: #b9bfc9;
    cursor: not-allowed;
  }

  .portal-foot {
    margin-top: 18px;
    font-size: 11px;
    color: #aab0bb;
    text-align: center;
  }

  /* ============================================================
     SCREEN 2 — "Do you love me?"
     ============================================================ */
  #screen-question {
    background: radial-gradient(circle at 50% 20%, #fff0f4 0%, #ffe1ea 55%, #ffd2e2 100%);
    overflow: hidden;
  }

  .floaters {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .floaters span {
    position: absolute;
    bottom: -10%;
    font-size: 22px;
    opacity: 0.55;
    animation: rise linear infinite;
    color: #ff5f8f;
  }
  @keyframes rise {
    0%   { transform: translateY(0) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.6; }
    100% { transform: translateY(-115vh) rotate(25deg); opacity: 0; }
  }

  .q-card {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 20px;
  }

  .q-eyebrow {
    font-size: 13px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #c2497a;
    font-weight: 700;
    margin-bottom: 10px;
  }

  .q-title {
    font-family: "Brush Script MT", "Segoe Script", cursive;
    font-size: clamp(38px, 8vw, 64px);
    color: #c2185b;
    margin: 0 0 36px;
    text-shadow: 0 2px 0 rgba(255,255,255,0.6);
  }

  .q-buttons {
    position: relative;
    display: flex;
    gap: 22px;
    justify-content: center;
    align-items: center;
    height: 70px;
  }

  .btn-yes, .btn-no {
    padding: 14px 38px;
    font-size: 17px;
    font-weight: 700;
    border: none;
    border-radius: 999px;
    cursor: pointer;
    font-family: inherit;
  }

  .btn-yes {
    background: #ff4d7e;
    color: #fff;
    box-shadow: 0 8px 20px rgba(255, 77, 126, 0.45);
    transition: transform 0.15s ease;
  }
  .btn-yes:hover { transform: scale(1.08); }
  .btn-yes:active { transform: scale(0.96); }

  .btn-no {
    background: #ffffff;
    color: #c2185b;
    border: 2px solid #ffc1d6;
    position: absolute;
    transition: transform 0.18s ease, left 0.18s ease, top 0.18s ease;
  }

  /* ============================================================
     SCREEN 3 — the answer
     ============================================================ */
  #screen-answer {
    background: radial-gradient(circle at 50% 30%, #fff5f8 0%, #ffd6e6 60%, #ffb8d6 100%);
    overflow: hidden;
  }

  .answer-card {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 30px;
    animation: pop 0.5s ease;
  }
  @keyframes pop {
    0% { transform: scale(0.6); opacity: 0; }
    70% { transform: scale(1.05); opacity: 1; }
    100% { transform: scale(1); }
  }

  .answer-heart {
    font-size: 56px;
    margin-bottom: 8px;
    animation: beat 1.1s ease-in-out infinite;
  }
  @keyframes beat {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.18); }
  }

  .answer-title {
    font-family: "Brush Script MT", "Segoe Script", cursive;
    font-size: clamp(34px, 7vw, 58px);
    color: #c2185b;
    margin: 0;
    line-height: 1.25;
  }

  .answer-sub {
    margin-top: 18px;
    font-size: 15px;
    color: #9c3a63;
    letter-spacing: 0.02em;
  }

  @media (prefers-reduced-motion: reduce) {
    .floaters span, .answer-heart, .answer-card { animation: none !important; }
    .btn-yes:hover { transform: none; }
  }
</style>
</head>
<body>

  <!-- ============ SCREEN 1: disguise ============ -->
  <section id="screen-login" class="screen active">
    <div class="portal-card">
      <p class="portal-tag">Internal tool</p>
      <h1 class="portal-title">This thing is created by your man.</h1>

      <label class="field-label" for="loginInput">Access code</label>
      <input id="loginInput" class="field-input" type="text" placeholder="Type anything to continue" autocomplete="off" />

      <button id="continueBtn" class="portal-btn">Continue</button>
      <p class="portal-foot">v1.0 · built for one person only</p>
    </div>
  </section>

  <!-- ============ SCREEN 2: the question ============ -->
  <section id="screen-question" class="screen">
    <div class="floaters" id="floaters"></div>
    <div class="q-card">
      <p class="q-eyebrow">One question, Silvea</p>
      <h2 class="q-title">Do you love me?</h2>
      <div class="q-buttons" id="qButtons">
        <button class="btn-yes" id="yesBtn">Yes</button>
        <button class="btn-no" id="noBtn">No</button>
      </div>
    </div>
  </section>

  <!-- ============ SCREEN 3: the answer ============ -->
  <section id="screen-answer" class="screen">
    <div class="floaters" id="floatersAnswer"></div>
    <div class="answer-card">
      <div class="answer-heart">💗</div>
      <h2 class="answer-title">Aww Love YOU too~<br />Borshon</h2>
      <p class="answer-sub">there was only ever one right answer 🌸</p>
    </div>
  </section>

  <script>
    const screens = {
      login: document.getElementById('screen-login'),
      question: document.getElementById('screen-question'),
      answer: document.getElementById('screen-answer')
    };

    function showScreen(name) {
      Object.values(screens).forEach(s => s.classList.remove('active'));
      screens[name].classList.add('active');
    }

    // ---------- Screen 1: login -> question ----------
    const loginInput = document.getElementById('loginInput');
    const continueBtn = document.getElementById('continueBtn');

    continueBtn.addEventListener('click', () => {
      // Any non-empty text works, per the brief ("she can type anything")
      if (loginInput.value.trim() === '') {
        loginInput.focus();
        loginInput.style.borderColor = '#e08a9a';
        return;
      }
      spawnFloaters('floaters');
      showScreen('question');
    });

    loginInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') continueBtn.click();
    });

    // ---------- Screen 2: dodging "No" button ----------
    const noBtn = document.getElementById('noBtn');
    const qButtons = document.getElementById('qButtons');
    const yesBtn = document.getElementById('yesBtn');

    function dodge() {
      const wrapRect = qButtons.getBoundingClientRect();
      const btnW = noBtn.offsetWidth;
      const btnH = noBtn.offsetHeight;

      // Keep the dodge within a comfortable viewport-safe range
      const maxX = window.innerWidth - btnW - 24;
      const maxY = window.innerHeight - btnH - 24;
      const minX = 24;
      const minY = 24;

      const randX = Math.random() * (maxX - minX) + minX;
      const randY = Math.random() * (maxY - minY) + minY;

      noBtn.style.position = 'fixed';
      noBtn.style.left = randX + 'px';
      noBtn.style.top = randY + 'px';
    }

    // Trigger the dodge on hover/touch attempt — it never lets itself be pressed
    noBtn.addEventListener('mouseenter', dodge);
    noBtn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      dodge();
    }, { passive: false });
    noBtn.addEventListener('click', (e) => {
      // Safety net: if it somehow gets clicked, just dodge again instead of doing anything
      e.preventDefault();
      dodge();
    });

    yesBtn.addEventListener('click', () => {
      spawnFloaters('floatersAnswer');
      showScreen('answer');
    });

    // ---------- Floating hearts background ----------
    function spawnFloaters(containerId) {
      const container = document.getElementById(containerId);
      if (!container || container.dataset.filled) return;
      container.dataset.filled = '1';

      const symbols = ['❤', '💗', '🌸', '✨'];
      const count = 18;

      for (let i = 0; i < count; i++) {
        const span = document.createElement('span');
        span.textContent = symbols[Math.floor(Math.random() * symbols.length)];
        span.style.left = Math.random() * 100 + '%';
        span.style.fontSize = (16 + Math.random() * 22) + 'px';
        const duration = 6 + Math.random() * 6;
        span.style.animationDuration = duration + 's';
        span.style.animationDelay = (Math.random() * duration) + 's';
        container.appendChild(span);
      }
    }
  </script>
</body>
</html>
